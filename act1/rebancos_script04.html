<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>
      perform
    </title>

<script>
    function performBox() {
       var v1 = document.getElementById("form1").elements.namedItem("value1").value;
       var v2 = document.getElementById("form1").elements.namedItem("value2").value;

        var n = Number(v1);
        var str = "";

        for (var i = 0; i < n; i++) {
            str = str + v2;
        }

        document.getElementById("area").innerHTML = str;
    }
</script>

</head>
<body>

<form id=form1 name=form1>

    Value1: <input type="text" name=value1 id=value1 value="" size=15 /> <br>
    Value2: <input type="text" name=value2 id=value2 value="" size=15 /> 
</form>

<button onclick="performBox()">Generate</button> 
<div id="area"></div>
</body>



</html>
