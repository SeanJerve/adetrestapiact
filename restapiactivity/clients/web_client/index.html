<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralis Secure Gateway</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="login-container">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            <h2>Auralis Web Gateway</h2>
        </div>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" id="submitBtn">
                <span id="btnText">Authenticate Request</span>
                <div class="loader" id="loader"></div>
            </button>
        </form>

        <div id="responseMessage" class="response-message hidden">
            <!-- API response will go here -->
        </div>
    </div>

    <!-- User Profile Card -->
    <div id="profileContainer" class="profile-container hidden">
        <div class="avatar" id="avatarLetter">A</div>
        <h3 id="profileName">User Name</h3>
        <p id="profileRole">Role</p>
        <button id="logoutBtn" class="logout-btn">Sign Out</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
